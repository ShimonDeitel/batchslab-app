name: BatchSlab
options:
  bundleIdPrefix: com.shimondeitel.epoxytablelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchSlab:
    type: application
    platform: iOS
    sources:
      - path: BatchSlab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.epoxytablelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchSlab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchSlabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchSlabTests
      - path: BatchSlab.storekit
    dependencies:
      - target: BatchSlab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.epoxytablelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchSlabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchSlabUITests
    dependencies:
      - target: BatchSlab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.epoxytablelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchSlab:
    build:
      targets:
        BatchSlab: all
        BatchSlabTests: [test]
        BatchSlabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchSlab.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchSlab.storekit
      targets:
        - BatchSlabTests
        - BatchSlabUITests
    archive:
      config: Release
